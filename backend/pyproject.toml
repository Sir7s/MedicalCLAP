[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
addopts = "-q"

[tool.ruff]
target-version = "py311"
line-length = 100
# Alembic migration scripts are autogenerated; don't lint them.
extend-exclude = ["alembic/versions"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]

[tool.ruff.lint.flake8-bugbear]
# FastAPI dependency-injection markers are the documented idiom in defaults.
extend-immutable-calls = ["fastapi.Form", "fastapi.File", "fastapi.Depends", "fastapi.Query"]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
