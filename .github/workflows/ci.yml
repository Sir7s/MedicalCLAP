name: ci

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Governance + scripts lane: lint, type-check, spec lock, unit tests.
  # ---------------------------------------------------------------------------
  governance:
    name: governance · lint · type · tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dev toolchain
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Lint (ruff)
        run: ruff check . backend
      - name: Type check (mypy)
        run: mypy scripts tests ml
      - name: Spec manifest integrity
        run: python scripts/spec_manifest.py --check
      - name: Unit tests (governance) + coverage
        run: pytest tests -q --ignore=tests/infra --ignore=tests/ml --cov --cov-report=xml --junitxml=governance-results.xml
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: governance-test-results
          path: |
            governance-results.xml
            coverage.xml

  # ---------------------------------------------------------------------------
  # Backend lane: install backend deps, lint/type/test the FastAPI app.
  # ---------------------------------------------------------------------------
  backend:
    name: backend · lint · type · tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend + tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install ruff==0.15.20 mypy==2.1.0 pytest==9.0.3
      - name: Lint (ruff)
        working-directory: backend
        run: ruff check .
      - name: Type check (mypy)
        working-directory: backend
        run: mypy app
      - name: Unit tests
        working-directory: backend
        run: pytest -q --junitxml=backend-results.xml
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/backend-results.xml

  # ---------------------------------------------------------------------------
  # ML lane: preprocessing/dataset tooling (numpy/scipy/nibabel).
  # ---------------------------------------------------------------------------
  ml:
    name: ml · preprocessing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ml deps + pytest
        run: |
          python -m pip install --upgrade pip
          pip install -r ml/requirements.txt pytest==9.0.3
      - name: ML tests
        run: pytest tests/ml -q --junitxml=ml-results.xml
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ml-test-results
          path: ml-results.xml

  # ---------------------------------------------------------------------------
  # Frontend lane: install and build the Vite/React app.
  # ---------------------------------------------------------------------------
  frontend:
    name: frontend · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Type-check + build
        working-directory: frontend
        run: npm run build

  # ---------------------------------------------------------------------------
  # Security & dependency scanning.
  # ---------------------------------------------------------------------------
  security:
    name: security · secrets · deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install audit tooling
        run: pip install bandit==1.9.4 pip-audit==2.10.1
      - name: SAST (bandit)
        run: bandit -r scripts backend/app -ll
      - name: Dependency audit (dev tools)
        run: pip-audit -r requirements-dev.txt
      - name: Dependency audit (backend)
        run: pip-audit -r backend/requirements.txt
      - name: Dependency audit (ml)
        run: pip-audit -r ml/requirements.txt

  # ---------------------------------------------------------------------------
  # Compose lane: validate the compose file, build app images, bring the stack
  # up, and run the integration tests against it.
  # ---------------------------------------------------------------------------
  compose:
    name: docker compose · integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose config
        run: docker compose -f infra/docker-compose.yml config -q
      - name: Bring up the stack
        run: docker compose -f infra/docker-compose.yml up -d --build --wait --wait-timeout 240
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend deps + test tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt pytest==9.0.3
      - name: Apply database migrations
        working-directory: backend
        run: alembic upgrade head
      - name: Run integration tests
        run: pytest tests/infra -q
      - name: Dump logs on failure
        if: failure()
        run: docker compose -f infra/docker-compose.yml logs
      - name: Tear down
        if: always()
        run: docker compose -f infra/docker-compose.yml down -v

  # ---------------------------------------------------------------------------
  # Aggregate gate — the single required status check for branch protection.
  # ---------------------------------------------------------------------------
  ci:
    name: ci
    runs-on: ubuntu-latest
    needs: [governance, backend, ml, frontend, security, compose]
    if: always()
    steps:
      - name: Verify all lanes succeeded
        run: |
          echo "governance=${{ needs.governance.result }}"
          echo "backend=${{ needs.backend.result }}"
          echo "ml=${{ needs.ml.result }}"
          echo "frontend=${{ needs.frontend.result }}"
          echo "security=${{ needs.security.result }}"
          echo "compose=${{ needs.compose.result }}"
          test "${{ needs.governance.result }}" = "success" \
            && test "${{ needs.backend.result }}" = "success" \
            && test "${{ needs.ml.result }}" = "success" \
            && test "${{ needs.frontend.result }}" = "success" \
            && test "${{ needs.security.result }}" = "success" \
            && test "${{ needs.compose.result }}" = "success"
      - name: PR summary
        if: always()
        run: |
          {
            echo "## CI summary"
            echo ""
            echo "| Lane | Result |"
            echo "|---|---|"
            echo "| governance (lint/type/tests) | ${{ needs.governance.result }} |"
            echo "| backend (lint/type/tests) | ${{ needs.backend.result }} |"
            echo "| ml (preprocessing) | ${{ needs.ml.result }} |"
            echo "| frontend (build) | ${{ needs.frontend.result }} |"
            echo "| security (secrets/sast/deps) | ${{ needs.security.result }} |"
            echo "| docker compose (integration) | ${{ needs.compose.result }} |"
          } >> "$GITHUB_STEP_SUMMARY"
