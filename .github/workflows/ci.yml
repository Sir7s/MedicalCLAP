name: ci

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # P0 governance + Python lane: lint, type-check, unit tests, coverage.
  # (Application code arrives in later phases; this lane validates the
  #  governance scaffolding and its own validators.)
  # ---------------------------------------------------------------------------
  python:
    name: lint · type · tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev toolchain
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy scripts tests

      - name: Spec manifest integrity (--check)
        run: python scripts/spec_manifest.py --check

      - name: Unit tests + coverage
        run: |
          pytest --cov --cov-report=term-missing --cov-report=xml \
                 --junitxml=test-results.xml

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-test-results
          path: |
            test-results.xml
            coverage.xml

  # ---------------------------------------------------------------------------
  # Security & dependency scanning.
  # ---------------------------------------------------------------------------
  security:
    name: security · secrets · deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev toolchain
        run: pip install -r requirements-dev.txt

      - name: SAST (bandit)
        run: bandit -r scripts -ll

      - name: Dependency audit (pip-audit)
        run: pip-audit -r requirements-dev.txt

  # ---------------------------------------------------------------------------
  # Frontend lane — placeholder until the React app lands in P1+.
  # Kept green and minimal so the required check exists from P0 onward.
  # ---------------------------------------------------------------------------
  frontend:
    name: frontend (placeholder)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Frontend placeholder
        run: echo "No frontend app yet (arrives in P1+). Lane reserved."

  # ---------------------------------------------------------------------------
  # Docker build lane — stubbed until docker-compose / Dockerfiles land in P1.
  # ---------------------------------------------------------------------------
  docker-build:
    name: docker build (stub)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Docker build placeholder
        run: |
          if ls infra/Dockerfile* >/dev/null 2>&1; then
            echo "Dockerfiles present — build in the phase that introduces them."
          else
            echo "No Dockerfiles yet (arrive in P1). Stub passes."
          fi

  # ---------------------------------------------------------------------------
  # Aggregate gate — the single required status check for branch protection.
  # ---------------------------------------------------------------------------
  ci:
    name: ci
    runs-on: ubuntu-latest
    needs: [python, security, frontend, docker-build]
    if: always()
    steps:
      - name: Verify all lanes succeeded
        run: |
          echo "python=${{ needs.python.result }}"
          echo "security=${{ needs.security.result }}"
          echo "frontend=${{ needs.frontend.result }}"
          echo "docker-build=${{ needs.docker-build.result }}"
          test "${{ needs.python.result }}" = "success" \
            && test "${{ needs.security.result }}" = "success" \
            && test "${{ needs.frontend.result }}" = "success" \
            && test "${{ needs.docker-build.result }}" = "success"

      - name: PR summary
        if: always()
        run: |
          {
            echo "## CI summary"
            echo ""
            echo "| Lane | Result |"
            echo "|---|---|"
            echo "| python (lint/type/tests) | ${{ needs.python.result }} |"
            echo "| security (secrets/sast/deps) | ${{ needs.security.result }} |"
            echo "| frontend (placeholder) | ${{ needs.frontend.result }} |"
            echo "| docker-build (stub) | ${{ needs.docker-build.result }} |"
          } >> "$GITHUB_STEP_SUMMARY"
